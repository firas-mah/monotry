<div class="rating-display" [ngClass]="sizeClass">
  <div class="stars">
    <span *ngFor="let star of stars" class="star" [class.filled]="star === '★'">{{ star }}</span>
  </div>
  <div class="rating-info" *ngIf="showText || showCount">
    <span class="rating-value" *ngIf="showText">{{ formattedRating }}</span>
    <span class="rating-count" *ngIf="showCount && totalRatings > 0">({{ totalRatings }} {{ totalRatings === 1 ? 'rating' : 'ratings' }})</span>
    <span class="no-ratings" *ngIf="showCount && totalRatings === 0">(No ratings yet)</span>
  </div>
</div>
