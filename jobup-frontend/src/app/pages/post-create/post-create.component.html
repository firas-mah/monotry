<form (ngSubmit)="createPost()" class="max-w-md mx-auto p-4 bg-white rounded shadow">
  <h2 class="text-xl font-bold mb-4">Create a Job Post</h2>

  <div class="mb-2">
    <input [(ngModel)]="title" name="title" placeholder="Title" class="w-full p-2 border rounded" required>
  </div>

  <div class="mb-2">
    <textarea [(ngModel)]="description" name="description" placeholder="Description" class="w-full p-2 border rounded" rows="4" required></textarea>
  </div>

  <div class="mb-4">
    <input [(ngModel)]="location" name="location" placeholder="Location" class="w-full p-2 border rounded" required>
  </div>

  <!-- Attachments (optional) -->
  <div class="mb-4">
    <h3 class="text-lg font-medium mb-2">Attachments (Optional)</h3>

    <input
      type="file"
      (change)="onFilesSelected($event)"
      multiple
      accept=".jpg,.jpeg,.png,.gif,.pdf,.doc,.docx"
      class="block w-full text-sm text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
    />

    <div *ngIf="selectedFiles.length" class="mt-3 space-y-2">
      <div *ngFor="let f of selectedFiles; let i = index" class="flex items-center justify-between text-sm bg-gray-50 px-3 py-2 rounded">
        <span class="truncate">{{ f.name }} ({{ f.size | number }} bytes)</span>
        <button type="button" class="text-red-600 hover:underline" (click)="removeFile(i)">Remove</button>
      </div>
      <p class="text-xs text-gray-500">Up to 3 files. Images or PDF/DOC/DOCX.</p>
    </div>
  </div>

  <button type="submit" [disabled]="isLoading" class="bg-blue-600 text-white px-4 py-2 rounded w-full">
    {{ isLoading ? 'Creating...' : 'Create Post' }}
  </button>

  <div *ngIf="success" class="text-green-600 mt-2">Post created successfully!</div>
  <div *ngIf="error" class="text-red-600 mt-2">{{ error }}</div>
</form>
